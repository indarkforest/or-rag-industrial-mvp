# 评估问题集：每题含参考答案要点，用于 LLM-as-judge 对比评分
questions:
  - id: q1
    type: simple
    question: "R-101 釜内温度的正常操作范围是多少？高温报警和联锁值分别是多少？"
    reference: "正常操作范围 82~88℃（工艺控制指标 85±3℃）；TAH-101 高报警设定 92℃；TAHH-101 联锁值 98℃。"

  - id: q2
    type: multi_hop
    question: "如果仪表风压力低于 0.4 MPa，会对 R-101 的温度产生什么影响？请说明完整的因果链。"
    reference: "仪表风压力不足 → TV-101（气开阀）无法达到指令开度 → 夹套冷却水流量 FI-102 下降 → 换热能力不足 → 釜温 TI-101 上升 → 触发 TAH-101 报警，严重时触发 TAHH-101 联锁。"

  - id: q3
    type: multi_hop
    question: "TAH-101 报警触发后，除了冷却水阀开度不足，还有哪些可能的根因？"
    reference: "冷却水泵 P-201 故障停运（备用泵 P-202 启动失败）；搅拌器 M-101 转速下降或跳停导致传热不均局部过热；引发剂加入过量导致放热速率超出冷却能力；仪表风低压导致 TV-101 开度不足。"

  - id: q4
    type: simple
    question: "TIC-101 控制回路的被控变量、操纵变量和整定参数是什么？"
    reference: "被控变量为 R-101 釜内温度 TI-101；操纵变量为夹套冷却水调节阀 TV-101 开度；PID 整定参数 Kp=2.4，Ti=180s，Td=30s；反作用。"

  - id: q5
    type: multi_hop
    question: "冷却水流量正常的情况下，釜温仍然异常上升，最可能的原因是什么？依据是什么？"
    reference: "最可能是搅拌器 M-101 跳停/转速下降。案例二表明搅拌停止时物料停止循环，即使冷却水流量正常，换热效率也大幅下降，导致局部过热、TI-101 上升；另一可能是引发剂误加过量导致放热超出冷却能力。"

  - id: q6
    type: multi_hop
    question: "PAL-401 报警为什么需要重视？它与哪些下游报警存在级联关系？"
    reference: "PAL-401（仪表风低压）是 TV-101 开度不足的上游原因，处置不及时会级联引发 FAL-102（冷却水低流量）和 TAH-101（釜温高报警）。案例一中正是因 PAL-401 未及时处置导致超温事件，事后已将其优先级由中提升为高。"
